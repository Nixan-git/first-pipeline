name: terraform

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  
env:
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  
jobs:
  network:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug secret presence (safe)
        run: |
          [ -n "${{ secrets.AZURE_CLIENT_ID }}" ] && echo "AZURE_CLIENT_ID is SET" || echo "AZURE_CLIENT_ID is EMPTY"
          [ -n "${{ secrets.AZURE_TENANT_ID }}" ] && echo "AZURE_TENANT_ID is SET" || echo "AZURE_TENANT_ID is EMPTY"
          [ -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ] && echo "AZURE_SUBSCRIPTION_ID is SET" || echo "AZURE_SUBSCRIPTION_ID is EMPTY"

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform (2-network)
        run: |
          cd "2-network"
          terraform fmt -check
          terraform init -input=false
          terraform validate
          terraform plan -input=false
          terraform apply -auto-approve -input=false

  compute:
    needs: network
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug compute folder and main.tf
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "----- find main.tf -----"
          find . -maxdepth 3 -name main.tf -print
          echo "----- show public_key lines -----"
          grep -RIn "public_key" . | head -n 50

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform (3-compute)
        env:
          SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}
        run: |
          cd "3-compute"
          terraform fmt -check
          terraform init -input=false
          terraform validate
          terraform plan -input=false -var="ssh_public_key=${SSH_PUBLIC_KEY}"
          terraform apply -auto-approve -input=false -var="ssh_public_key=${SSH_PUBLIC_KEY}"
